<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>D Tech Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25), 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .brand {
            background: #0a2b3e;
            padding: 32px 24px 24px;
            text-align: center;
            color: white;
        }

        .brand h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .brand p {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .tabs {
            display: flex;
            background: #f1f4f9;
            border-bottom: 1px solid #e2e8f0;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 0;
            font-size: 1rem;
            font-weight: 600;
            color: #4a5b6e;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: white;
            color: #0a2b3e;
            border-bottom: 3px solid #0a2b3e;
        }

        .form-panel {
            padding: 28px 24px 36px;
            background: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e2a3e;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 28px;
            background: #fefefe;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #0a2b3e;
            box-shadow: 0 0 0 3px rgba(10,43,62,0.1);
        }

        button {
            width: 100%;
            background: #0a2b3e;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        button:hover {
            background: #134b66;
        }

        .secondary-btn {
            background: transparent;
            color: #0a2b3e;
            border: 1.5px solid #cbd5e1;
            margin-top: 12px;
        }

        .secondary-btn:hover {
            background: #f1f5f9;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 28px;
            font-size: 0.85rem;
            text-align: center;
            background: #f8fafc;
            color: #1e293b;
        }

        .error {
            background: #fee2e2;
            color: #b91c1c;
        }

        .success {
            background: #e0f2e9;
            color: #166534;
        }

        .hidden {
            display: none;
        }

        .forgot-link {
            text-align: right;
            margin-top: 8px;
        }

        .forgot-link span {
            font-size: 0.8rem;
            color: #3b7c9c;
            cursor: pointer;
            text-decoration: underline;
        }

        footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.7rem;
            color: #6c7a8e;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="card">
        <div class="brand">
            <h1>D Tech Pro</h1>
            <p>Your trusted platform</p>
        </div>
        <div class="tabs">
            <button class="tab-btn active" id="loginTab">Login</button>
            <button class="tab-btn" id="registerTab">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginPanel" class="form-panel">
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="loginMobile" placeholder="10 digits (6-9)" maxlength="10" inputmode="numeric">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <div class="forgot-link">
                <span id="forgotBtn">Forgot password?</span>
            </div>
            <button id="loginBtn">Sign In</button>
            <div id="loginMessage" class="message hidden"></div>
        </div>

        <!-- Register Form -->
        <div id="registerPanel" class="form-panel hidden">
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="regMobile" placeholder="10 digits (6-9)" maxlength="10" inputmode="numeric">
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="regDob">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Create password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="regConfirmPassword" placeholder="Confirm password">
            </div>
            <button id="registerBtn">Create Account</button>
            <div id="registerMessage" class="message hidden"></div>
        </div>

        <!-- Reset Password Modal (simple inline) -->
        <div id="resetPanel" class="form-panel hidden">
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="resetMobile" placeholder="10 digits" maxlength="10">
            </div>
            <div class="form-group">
                <label>Date of Birth (YYYY-MM-DD)</label>
                <input type="date" id="resetDob">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="resetNewPassword" placeholder="New password">
            </div>
            <button id="resetSubmitBtn">Reset Password</button>
            <button id="cancelResetBtn" class="secondary-btn">Cancel</button>
            <div id="resetMessage" class="message hidden"></div>
        </div>
    </div>
    <footer>© 2025 D Tech Pro – All transactions via Telegram bot</footer>
</div>

<script>
    // ==== CONFIGURATION ====
    const API_URL = "https://script.google.com/macros/s/AKfycbwABiugn_frb9SadY_jVGIXoARmk5iGq-T5fc7OHVfmq-UK5uKGEcNCN5kvrzmSUKk/exec";

    // Helper to show/hide panels
    const loginPanel = document.getElementById('loginPanel');
    const registerPanel = document.getElementById('registerPanel');
    const resetPanel = document.getElementById('resetPanel');
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const forgotBtn = document.getElementById('forgotBtn');
    const cancelResetBtn = document.getElementById('cancelResetBtn');

    function showPanel(panel) {
        loginPanel.classList.add('hidden');
        registerPanel.classList.add('hidden');
        resetPanel.classList.add('hidden');
        document.getElementById(panel).classList.remove('hidden');
    }

    loginTab.addEventListener('click', () => {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        showPanel('loginPanel');
    });
    registerTab.addEventListener('click', () => {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        showPanel('registerPanel');
    });
    forgotBtn.addEventListener('click', () => {
        showPanel('resetPanel');
    });
    cancelResetBtn.addEventListener('click', () => {
        showPanel('loginPanel');
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
    });

    // API call function
    async function callAPI(action, data) {
        const payload = { action, ...data };
        const response = await fetch(API_URL, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        return await response.json();
    }

    // Validation helpers
    function isValidMobile(mob) {
        return /^[6-9][0-9]{9}$/.test(mob);
    }

    // Login
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const mobile = document.getElementById('loginMobile').value.trim();
        const password = document.getElementById('loginPassword').value;
        const msgDiv = document.getElementById('loginMessage');
        if (!isValidMobile(mobile)) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Enter valid 10-digit mobile number starting with 6,7,8,9';
            msgDiv.classList.remove('hidden');
            return;
        }
        if (!password) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Password required';
            msgDiv.classList.remove('hidden');
            return;
        }
        msgDiv.classList.add('hidden');
        try {
            const res = await callAPI('login', { mobile, password });
            if (res.success) {
                msgDiv.className = 'message success';
                msgDiv.innerText = 'Login successful! Redirecting...';
                msgDiv.classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = 'https://t.me/YourBotUsername'; // redirect to your Telegram bot or dashboard
                }, 1500);
            } else {
                msgDiv.className = 'message error';
                msgDiv.innerText = res.error || 'Login failed';
                msgDiv.classList.remove('hidden');
            }
        } catch (err) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Server error. Try again.';
            msgDiv.classList.remove('hidden');
        }
    });

    // Register
    document.getElementById('registerBtn').addEventListener('click', async () => {
        const mobile = document.getElementById('regMobile').value.trim();
        const dob = document.getElementById('regDob').value;
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;
        const msgDiv = document.getElementById('registerMessage');
        if (!isValidMobile(mobile)) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Mobile must be 10 digits starting with 6-9';
            msgDiv.classList.remove('hidden');
            return;
        }
        if (!dob) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Date of Birth required';
            msgDiv.classList.remove('hidden');
            return;
        }
        if (password.length < 4) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Password must be at least 4 characters';
            msgDiv.classList.remove('hidden');
            return;
        }
        if (password !== confirm) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Passwords do not match';
            msgDiv.classList.remove('hidden');
            return;
        }
        msgDiv.classList.add('hidden');
        try {
            const res = await callAPI('register', { mobile, password, dob });
            if (res.success) {
                msgDiv.className = 'message success';
                msgDiv.innerText = 'Registration successful! Please login.';
                msgDiv.classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('regMobile').value = '';
                    document.getElementById('regDob').value = '';
                    document.getElementById('regPassword').value = '';
                    document.getElementById('regConfirmPassword').value = '';
                    loginTab.click();
                }, 1500);
            } else {
                msgDiv.className = 'message error';
                msgDiv.innerText = res.error || 'Registration failed';
                msgDiv.classList.remove('hidden');
            }
        } catch (err) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Server error. Try again.';
            msgDiv.classList.remove('hidden');
        }
    });

    // Reset Password
    document.getElementById('resetSubmitBtn').addEventListener('click', async () => {
        const mobile = document.getElementById('resetMobile').value.trim();
        const dob = document.getElementById('resetDob').value;
        const newPassword = document.getElementById('resetNewPassword').value;
        const msgDiv = document.getElementById('resetMessage');
        if (!isValidMobile(mobile)) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Invalid mobile number';
            msgDiv.classList.remove('hidden');
            return;
        }
        if (!dob) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Date of Birth required';
            msgDiv.classList.remove('hidden');
            return;
        }
        if (newPassword.length < 4) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Password must be at least 4 characters';
            msgDiv.classList.remove('hidden');
            return;
        }
        msgDiv.classList.add('hidden');
        try {
            const res = await callAPI('reset', { mobile, dob, newPassword });
            if (res.success) {
                msgDiv.className = 'message success';
                msgDiv.innerText = 'Password reset successful! Please login.';
                msgDiv.classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('resetMobile').value = '';
                    document.getElementById('resetDob').value = '';
                    document.getElementById('resetNewPassword').value = '';
                    showPanel('loginPanel');
                    loginTab.classList.add('active');
                    registerTab.classList.remove('active');
                }, 1500);
            } else {
                msgDiv.className = 'message error';
                msgDiv.innerText = res.error || 'Reset failed';
                msgDiv.classList.remove('hidden');
            }
        } catch (err) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Server error. Try again.';
            msgDiv.classList.remove('hidden');
        }
    });

    // Input restrictions: only digits for mobile
    const mobileInputs = ['loginMobile', 'regMobile', 'resetMobile'];
    mobileInputs.forEach(id => {
        const input = document.getElementById(id);
        input.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0,10);
        });
    });
</script>
</body>
</html>
