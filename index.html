<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>D Tech Pro</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif}
        body{background:linear-gradient(145deg,#f0f4fa 0%,#e2e8f0 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .app-container{width:100%;max-width:480px}
        .card{background:rgba(255,255,255,0.98);border-radius:48px;box-shadow:0 25px 45px -12px rgba(0,0,0,0.25);overflow:hidden}
        .brand{background:#0a2b3e;padding:32px 24px 24px;text-align:center;color:#fff}
        .brand h1{font-size:2.2rem;font-weight:700;margin-bottom:6px}
        .brand p{font-size:0.85rem;opacity:0.8}
        .tabs{display:flex;background:#f1f4f9;border-bottom:1px solid #e2e8f0}
        .tab-btn{flex:1;background:0;border:0;padding:16px 0;font-size:1rem;font-weight:600;color:#4a5b6e;cursor:pointer}
        .tab-btn.active{background:#fff;color:#0a2b3e;border-bottom:3px solid #0a2b3e}
        .form-panel{padding:28px 24px 36px;background:#fff}
        .form-group{margin-bottom:20px}
        label{display:block;font-size:0.85rem;font-weight:600;margin-bottom:8px;color:#1e2a3e}
        input{width:100%;padding:14px 16px;font-size:1rem;border:1.5px solid #e2e8f0;border-radius:28px;background:#fefefe}
        input:focus{outline:0;border-color:#0a2b3e;box-shadow:0 0 0 3px rgba(10,43,62,0.1)}
        button{width:100%;background:#0a2b3e;color:#fff;border:0;padding:14px;font-size:1rem;font-weight:600;border-radius:40px;cursor:pointer;margin-top:8px}
        button:hover{background:#134b66}
        .secondary-btn{background:0;color:#0a2b3e;border:1.5px solid #cbd5e1}
        .secondary-btn:hover{background:#f1f5f9}
        .message{margin-top:20px;padding:12px;border-radius:28px;font-size:0.85rem;text-align:center}
        .error{background:#fee2e2;color:#b91c1c}
        .success{background:#e0f2e9;color:#166534}
        .hidden{display:none}
        .forgot-link{text-align:right;margin-top:8px}
        .forgot-link span{font-size:0.8rem;color:#3b7c9c;cursor:pointer;text-decoration:underline}
        footer{text-align:center;margin-top:24px;font-size:0.7rem;color:#6c7a8e}
        .test-btn{background:#6c7a8e;margin-top:10px}
    </style>
</head>
<body>
<div class="app-container">
    <div class="card">
        <div class="brand"><h1>D Tech Pro</h1><p>Your trusted platform</p></div>
        <div class="tabs">
            <button class="tab-btn active" id="loginTabBtn">Login</button>
            <button class="tab-btn" id="registerTabBtn">Register</button>
        </div>
        <div id="loginPanel" class="form-panel">
            <div class="form-group"><label>Mobile Number</label><input type="tel" id="loginMobile" placeholder="10 digits (6-9)" maxlength="10"></div>
            <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
            <div class="forgot-link"><span id="forgotLink">Forgot password?</span></div>
            <button id="loginBtn">Sign In</button>
            <div id="loginMsg" class="message hidden"></div>
        </div>
        <div id="registerPanel" class="form-panel hidden">
            <div class="form-group"><label>Mobile Number</label><input type="tel" id="regMobile" placeholder="10 digits (6-9)" maxlength="10"></div>
            <div class="form-group"><label>Date of Birth</label><input type="date" id="regDob"></div>
            <div class="form-group"><label>Password</label><input type="password" id="regPassword" placeholder="Create password"></div>
            <div class="form-group"><label>Confirm Password</label><input type="password" id="regConfirmPassword" placeholder="Confirm password"></div>
            <button id="registerBtn">Create Account</button>
            <div id="registerMsg" class="message hidden"></div>
        </div>
        <div id="resetPanel" class="form-panel hidden">
            <div class="form-group"><label>Mobile Number</label><input type="tel" id="resetMobile" placeholder="10 digits" maxlength="10"></div>
            <div class="form-group"><label>Date of Birth</label><input type="date" id="resetDob"></div>
            <div class="form-group"><label>New Password</label><input type="password" id="resetNewPassword" placeholder="New password"></div>
            <button id="resetSubmitBtn">Reset Password</button>
            <button id="cancelResetBtn" class="secondary-btn">Cancel</button>
            <div id="resetMsg" class="message hidden"></div>
        </div>
    </div>
    <footer>© 2025 D Tech Pro – All transactions via Telegram bot</footer>
    <button id="testApiBtn" class="test-btn">Test API Connection</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzr5E3zoHLIQkeZpSoyrBNFC5UOB9D0wpcVv8kAq85a62C-jYpwrLzYaGhaFfgc7L37Bg/exec";

    // UI logic (unchanged)
    const loginPanel = document.getElementById('loginPanel');
    const registerPanel = document.getElementById('registerPanel');
    const resetPanel = document.getElementById('resetPanel');
    const loginTab = document.getElementById('loginTabBtn');
    const registerTab = document.getElementById('registerTabBtn');
    const forgotLink = document.getElementById('forgotLink');
    const cancelResetBtn = document.getElementById('cancelResetBtn');
    function showPanel(panelId) {
        loginPanel.classList.add('hidden');
        registerPanel.classList.add('hidden');
        resetPanel.classList.add('hidden');
        document.getElementById(panelId).classList.remove('hidden');
    }
    loginTab.addEventListener('click', () => { loginTab.classList.add('active'); registerTab.classList.remove('active'); showPanel('loginPanel'); });
    registerTab.addEventListener('click', () => { registerTab.classList.add('active'); loginTab.classList.remove('active'); showPanel('registerPanel'); });
    forgotLink.addEventListener('click', () => { showPanel('resetPanel'); });
    cancelResetBtn.addEventListener('click', () => { showPanel('loginPanel'); loginTab.classList.add('active'); registerTab.classList.remove('active'); });

    // API call using form-urlencoded (no preflight)
    async function callAPI(action, data) {
        try {
            const formData = new URLSearchParams();
            formData.append('payload', JSON.stringify({ action, ...data }));
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            const text = await response.text();
            try {
                return JSON.parse(text);
            } catch (e) {
                return { success: false, error: 'Server error' };
            }
        } catch (err) {
            return { success: false, error: `Network error: ${err.message}` };
        }
    }

    function isValidMobile(mob) { return /^[6-9][0-9]{9}$/.test(mob); }

    // Login
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const mobile = document.getElementById('loginMobile').value.trim();
        const password = document.getElementById('loginPassword').value;
        const msgDiv = document.getElementById('loginMsg');
        if (!isValidMobile(mobile)) { msgDiv.className = 'message error'; msgDiv.innerText = 'Enter valid 10-digit mobile (starting 6-9)'; msgDiv.classList.remove('hidden'); return; }
        if (!password) { msgDiv.className = 'message error'; msgDiv.innerText = 'Password required'; msgDiv.classList.remove('hidden'); return; }
        msgDiv.classList.add('hidden');
        const res = await callAPI('login', { mobile, password });
        if (res.success) {
            msgDiv.className = 'message success'; msgDiv.innerText = 'Login successful! Redirecting...'; msgDiv.classList.remove('hidden');
            setTimeout(() => { window.location.href = 'https://t.me/Image_2_3D_Bot'; }, 1500);
        } else {
            msgDiv.className = 'message error'; msgDiv.innerText = res.error || 'Login failed'; msgDiv.classList.remove('hidden');
        }
    });

    // Register
    document.getElementById('registerBtn').addEventListener('click', async () => {
        const mobile = document.getElementById('regMobile').value.trim();
        const dob = document.getElementById('regDob').value;
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;
        const msgDiv = document.getElementById('registerMsg');
        if (!isValidMobile(mobile)) { msgDiv.className = 'message error'; msgDiv.innerText = 'Mobile must be 10 digits starting 6-9'; msgDiv.classList.remove('hidden'); return; }
        if (!dob) { msgDiv.className = 'message error'; msgDiv.innerText = 'Date of Birth required'; msgDiv.classList.remove('hidden'); return; }
        if (password.length < 4) { msgDiv.className = 'message error'; msgDiv.innerText = 'Password must be at least 4 characters'; msgDiv.classList.remove('hidden'); return; }
        if (password !== confirm) { msgDiv.className = 'message error'; msgDiv.innerText = 'Passwords do not match'; msgDiv.classList.remove('hidden'); return; }
        msgDiv.classList.add('hidden');
        const res = await callAPI('register', { mobile, password, dob });
        if (res.success) {
            msgDiv.className = 'message success'; msgDiv.innerText = 'Registration successful! Please login.'; msgDiv.classList.remove('hidden');
            setTimeout(() => { document.getElementById('regMobile').value = ''; document.getElementById('regDob').value = ''; document.getElementById('regPassword').value = ''; document.getElementById('regConfirmPassword').value = ''; loginTab.click(); }, 1500);
        } else {
            msgDiv.className = 'message error'; msgDiv.innerText = res.error || 'Registration failed'; msgDiv.classList.remove('hidden');
        }
    });

    // Reset
    document.getElementById('resetSubmitBtn').addEventListener('click', async () => {
        const mobile = document.getElementById('resetMobile').value.trim();
        const dob = document.getElementById('resetDob').value;
        const newPassword = document.getElementById('resetNewPassword').value;
        const msgDiv = document.getElementById('resetMsg');
        if (!isValidMobile(mobile)) { msgDiv.className = 'message error'; msgDiv.innerText = 'Invalid mobile number'; msgDiv.classList.remove('hidden'); return; }
        if (!dob) { msgDiv.className = 'message error'; msgDiv.innerText = 'Date of Birth required'; msgDiv.classList.remove('hidden'); return; }
        if (newPassword.length < 4) { msgDiv.className = 'message error'; msgDiv.innerText = 'Password must be at least 4 characters'; msgDiv.classList.remove('hidden'); return; }
        msgDiv.classList.add('hidden');
        const res = await callAPI('reset', { mobile, dob, newPassword });
        if (res.success) {
            msgDiv.className = 'message success'; msgDiv.innerText = 'Password reset successful! Please login.'; msgDiv.classList.remove('hidden');
            setTimeout(() => { document.getElementById('resetMobile').value = ''; document.getElementById('resetDob').value = ''; document.getElementById('resetNewPassword').value = ''; showPanel('loginPanel'); loginTab.classList.add('active'); registerTab.classList.remove('active'); }, 1500);
        } else {
            msgDiv.className = 'message error'; msgDiv.innerText = res.error || 'Reset failed'; msgDiv.classList.remove('hidden');
        }
    });

    // Mobile input filtering
    ['loginMobile', 'regMobile', 'resetMobile'].forEach(id => {
        const input = document.getElementById(id);
        input.addEventListener('input', (e) => { e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 10); });
    });

    // Test API (GET)
    document.getElementById('testApiBtn').addEventListener('click', async () => {
        const msgDiv = document.getElementById('loginMsg');
        msgDiv.classList.remove('hidden'); msgDiv.className = 'message'; msgDiv.innerText = 'Testing...';
        try {
            const res = await fetch(API_URL, { method: 'GET' });
            const text = await res.text();
            msgDiv.innerText = `API responded: ${text.substring(0, 100)}`;
            msgDiv.className = 'message success';
        } catch (err) {
            msgDiv.innerText = `Error: ${err.message}`;
            msgDiv.className = 'message error';
        }
    });
</script>
</body>
</html>
